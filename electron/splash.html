<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 500px;
      height: 400px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      width: 460px;
      height: 360px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      border-radius: 24px;
      border: 1px solid rgba(220, 38, 38, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 40px rgba(220,38,38,0.1);
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(220, 38, 38, 0.3);
      border-radius: 50%;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-30px) scale(1.5); opacity: 0.7; }
    }

    /* Logo */
    .logo-wrapper {
      position: relative;
      opacity: 0;
      transform: scale(0.5);
      animation: logoAppear 1s ease-out 0.5s forwards;
    }

    @keyframes logoAppear {
      to { opacity: 1; transform: scale(1); }
    }

    .logo-glow {
      position: absolute;
      inset: -15px;
      border-radius: 20px;
      background: conic-gradient(from 0deg, #dc2626, #f97316, #eab308, #dc2626);
      filter: blur(15px);
      opacity: 0.6;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo {
      position: relative;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #dc2626, #ea580c);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.5);
    }

    .logo span {
      color: white;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    /* Title */
    .title {
      margin-top: 24px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.8s ease-out 1.5s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .title h1 {
      color: white;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      text-align: center;
    }

    .title .subtitle {
      color: #dc2626;
      font-size: 12px;
      letter-spacing: 6px;
      text-align: center;
      margin-top: 4px;
      font-weight: 600;
    }

    /* Made by */
    .author {
      margin-top: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 2.5s forwards;
    }

    .author p {
      color: #666;
      font-size: 11px;
      text-align: center;
    }

    .author .name {
      color: #999;
      font-weight: 600;
      font-size: 12px;
      margin-top: 2px;
    }

    /* Warning */
    .warning {
      margin-top: 20px;
      padding: 8px 16px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 10px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 3.5s forwards;
    }

    .warning p {
      color: #f87171;
      font-size: 9px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Loading */
    .loading {
      margin-top: 16px;
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 0.5s ease-out 2s forwards;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #dc2626;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Particles -->
    <div class="particles">
      <script>
        for (let i = 0; i < 20; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = Math.random() * 4 + 's';
          p.style.animationDuration = (3 + Math.random() * 3) + 's';
          document.querySelector('.particles').appendChild(p);
        }
      </script>
    </div>

    <!-- Logo -->
    <div class="logo-wrapper">
      <div class="logo-glow"></div>
      <div class="logo">
        <span>MMB</span>
      </div>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>MMB AGENT</h1>
      <div class="subtitle">2 4 / 7</div>
    </div>

    <!-- Author -->
    <div class="author">
      <p>Made by</p>
      <p class="name">Kuldeep Prajapati</p>
    </div>

    <!-- Loading -->
    <div class="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Warning -->
    <div class="warning">
      <p>⚠️ LICENSED SOFTWARE — Running without owner's permission is prohibited</p>
    </div>
  </div>
</body>
</html>
